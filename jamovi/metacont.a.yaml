name: metaCont
title: Continuous Meta-Analysis
menuGroup: MetaPort
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: studyLabel
    title: Study Labels
    type: Variable
    suggested:
      - nominal
    permitted:
      - factor
      - id

  - name: meanE
    title: Mean (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdE
    title: SD (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nE
    title: Total (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: meanC
    title: Mean (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdC
    title: SD (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nC
    title: Total (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sm
    title: Summary Measure
    type: List
    options:
      - title: Mean Difference (MD)
        name: md
      - title: Standardised Mean Difference (SMD)
        name: smd
      - title: Ratio of Means (ROM)
        name: rom
    default: md

  - name: methodSmd
    title: SMD Method
    type: List
    options:
      - title: Hedges' g
        name: Hedges
      - title: Cohen's d
        name: Cohen
      - title: Glass' delta
        name: Glass
    default: Hedges

  - name: model
    title: Model
    type: List
    options:
      - title: Random & Common
        name: both
      - title: Random effects
        name: random
      - title: Common effect
        name: common
    default: both

  - name: methodTau
    title: Heterogeneity Estimator
    type: List
    options:
      - title: Restricted Maximum-Likelihood
        name: REML
      - title: Paule-Mandel
        name: PM
      - title: DerSimonian-Laird
        name: DL
      - title: Maximum-Likelihood
        name: ML
      - title: Hunter-Schmidt
        name: HS
      - title: Sidik-Jonkman
        name: SJ
      - title: Hedges
        name: HE
      - title: Empirical Bayes
        name: EB
    default: REML

  - name: methodRandomCi
    title: Random Effects CI Method
    type: List
    options:
      - title: Classic
        name: classic
      - title: Hartung-Knapp
        name: HK
    default: classic

  - name: prediction
    title: Prediction Interval
    type: Bool
    default: false

  - name: confidenceLevel
    title: Confidence Level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: showSummary
    title: Show Meta-Analysis Summary
    type: Bool
    default: true

  - name: forestPlot
    title: Forest Plot
    type: Bool
    default: true

  - name: forestMode
    title: ""
    type: List
    options:
      - title: Basic
        name: basic
      - title: Advanced
        name: advanced
    default: basic

  - name: forestLayout
    title: Layout
    type: List
    options:
      - title: Default
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
    default: meta

  - name: sortBy
    title: Sort Studies
    type: List
    options:
      - title: Original Order
        name: none
      - title: Effect Size (Ascending)
        name: effectAsc
      - title: Effect Size (Descending)
        name: effectDesc
      - title: Weight (Ascending)
        name: weightAsc
      - title: Weight (Descending)
        name: weightDesc
    default: none

  - name: labelE
    title: Experimental Label
    type: String
    default: Experimental

  - name: labelC
    title: Control Label
    type: String
    default: Control

  - name: labelLeft
    title: Left Side Label
    type: String
    default: ""

  - name: labelRight
    title: Right Side Label
    type: String
    default: ""

  - name: forestWidthAdjust
    title: Width Adjustment (+/-)
    type: Number
    default: 0

  - name: forestWidthUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: forestHeightAdjust
    title: Height Adjustment (+/-)
    type: Number
    default: 0

  - name: forestHeightUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: xlimMode
    title: X-Axis Limits
    type: List
    options:
      - title: Auto
        name: auto
      - title: Custom
        name: custom
    default: auto

  - name: xlimLower
    title: Lower Limit
    type: Number
    default: -20

  - name: xlimUpper
    title: Upper Limit
    type: Number
    default: 20

  - name: addrowsMode
    title: Space Above Footnotes
    type: List
    options:
      - title: Auto
        name: auto
      - title: Custom
        name: custom
    default: auto

  - name: addrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: colgap
    title: Space Between Columns
    type: Number
    min: 0
    default: 2

  - name: colgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: colgapForest
    title: Space Around Plot
    type: Number
    min: 0
    default: 2

  - name: colgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupVariable
    title: Subgroup Variable
    type: Variable
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: tauCommon
    title: Common τ² Across Subgroups
    type: Bool
    default: false

  - name: predictionSubgroup
    title: Prediction Interval per Subgroup
    type: Bool
    default: false

  - name: showSubgroupSummary
    title: Show Subgroup Summary
    type: Bool
    default: true

  - name: subgroupForestPlot
    title: Forest Plot
    type: Bool
    default: true

  - name: subgroupForestMode
    title: ""
    type: List
    options:
      - title: Basic
        name: basic
      - title: Advanced
        name: advanced
    default: basic

  - name: printSubgroupName
    title: Print Subgroup Variable Name
    type: Bool
    default: true

  - name: subgroupForestLayout
    title: Layout
    type: List
    options:
      - title: Default
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
      - title: Subgroup
        name: subgroup
    default: meta

  - name: subgroupSortBy
    title: Sort Studies
    type: List
    options:
      - title: Original Order
        name: none
      - title: Effect Size (Ascending)
        name: effectAsc
      - title: Effect Size (Descending)
        name: effectDesc
      - title: Weight (Ascending)
        name: weightAsc
      - title: Weight (Descending)
        name: weightDesc
    default: none

  - name: subgroupLabelE
    title: Experimental Label
    type: String
    default: Experimental

  - name: subgroupLabelC
    title: Control Label
    type: String
    default: Control

  - name: subgroupLabelLeft
    title: Left Side Label
    type: String
    default: ""

  - name: subgroupLabelRight
    title: Right Side Label
    type: String
    default: ""

  - name: subgroupForestWidthAdjust
    title: Width Adjustment (+/-)
    type: Number
    default: 0

  - name: subgroupForestWidthUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupForestHeightAdjust
    title: Height Adjustment (+/-)
    type: Number
    default: 0

  - name: subgroupForestHeightUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupXlimMode
    title: X-Axis Limits
    type: List
    options:
      - title: Auto
        name: auto
      - title: Custom
        name: custom
    default: auto

  - name: subgroupXlimLower
    title: Lower Limit
    type: Number
    default: -20

  - name: subgroupXlimUpper
    title: Upper Limit
    type: Number
    default: 20

  - name: subgroupAddrowsMode
    title: Space Above Footnotes
    type: List
    options:
      - title: Auto
        name: auto
      - title: Custom
        name: custom
    default: auto

  - name: subgroupAddrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: subgroupColgap
    title: Space Between Columns
    type: Number
    min: 0
    default: 2

  - name: subgroupColgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupColgapForest
    title: Space Around Plot
    type: Number
    min: 0
    default: 2

  - name: subgroupColgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm
