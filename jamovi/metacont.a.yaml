  - name: funnelStudyLabel
    title: Study Labels
    type: Bool
    default: false

  - name: funnelContour
    title: Contour-Enhanced
    type: Bool
    default: false

  - name: funnelLegend
    title: Legend
    type: Bool
    default: true

  - name: funnelLegendPos
    title: Position
    type: List
    options:
      - title: Top Right
        name: topright
      - title: Top Left
        name: topleft
    default: topright

  - name: funnelLegendCex
