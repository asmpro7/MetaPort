name: metaCont
title: Continuous Meta-Analysis
menuGroup: MetaPort
version: '1.0.0'
jas: '1.2'

options:
  - name: data
    type: Data

  - name: studyLabel
    title: Study Labels
    type: Variable
    suggested: 
      - nominal
    permitted:
      - factor
      - id

  - name: meanE
    title: Mean (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdE
    title: SD (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nE
    title: Total (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: meanC
    title: Mean (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdC
    title: SD (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nC
    title: Total (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  # --- Model Options ---

  - name: sm
    title: Summary Measure
    type: List
    options:
      - title: Mean Difference (MD)
        name: md
      - title: Standardised Mean Difference (SMD)
        name: smd
      - title: Ratio of Means (ROM)
        name: rom
    default: md

  - name: methodSmd
    title: SMD Method
    type: List
    options:
      - title: Hedges' g
        name: Hedges
      - title: Cohen's d
        name: Cohen
      - title: Glass' delta
        name: Glass
    default: Hedges

  - name: random
    title: Random Effects
    type: Bool
    default: true

  - name: common
    title: Common Effect
    type: Bool
    default: true

  - name: methodTau
    title: Heterogeneity Estimator
    type: List
    options:
      - title: Restricted Maximum-Likelihood
        name: REML
      - title: DerSimonian-Laird
        name: DL
      - title: Paule-Mandel
        name: PM
      - title: Maximum-Likelihood
        name: ML
      - title: Hunter-Schmidt
        name: HS
      - title: Sidik-Jonkman
        name: SJ
      - title: Hedges
        name: HE
      - title: Empirical Bayes
        name: EB
    default: REML

  - name: methodRandomCi
    title: Random Effects CI Method
    type: List
    options:
      - title: Classic (Wald-type)
        name: classic
      - title: Hartung-Knapp
        name: HK
    default: classic

  - name: adhocHaknCi
    title: Ad-hoc Variance Correction
    type: List
    options:
      - title: None
        name: none
      - title: Correct using SE
        name: se
      - title: Correct using IQR
        name: IQR
      - title: Correct using CI
        name: ci
    default: none

  - name: prediction
    title: Prediction Interval
    type: Bool
    default: false

  - name: confidenceLevel
    title: Confidence Level
    type: Number
    default: 0.95

  - name: showSummary
    title: Show Summary Output
    type: Bool
    default: true

  # --- Forest Plot Options ---

  - name: forestPlot
    title: Forest Plot
    type: Bool
    default: true

  - name: forestLayout
    title: Layout
    type: List
    options:
      - title: Default (meta)
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
      - title: Subgroup
        name: subgroup
    default: RevMan5

  - name: sortBy
    title: Sort Studies
    type: List
    options:
      - title: Original Order
        name: none
      - title: Effect Size (Ascending)
        name: effectAsc
      - title: Effect Size (Descending)
        name: effectDesc
      - title: Weight (Ascending)
        name: weightAsc
      - title: Weight (Descending)
        name: weightDesc
    default: none

  - name: labelLeft
    title: Left Graph Label
    type: String
    default: ''

  - name: labelRight
    title: Right Graph Label
    type: String
    default: ''

  - name: labelE
    title: Label (Experimental)
    type: String
    default: Experimental

  - name: labelC
    title: Label (Control)
    type: String
    default: Control