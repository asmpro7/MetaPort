name: metaCont
title: Continuous Meta-Analysis
menuGroup: MetaJam
version: "1.0.0"
jas: "1.2"

options:
  - name: data
    type: Data

  - name: studyLabel
    title: Study Label
    type: Variable
    suggested:
      - nominal
    permitted:
      - factor
      - id

  - name: meanE
    title: Mean (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdE
    title: SD (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nE
    title: Total (Experimental)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: meanC
    title: Mean (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sdC
    title: SD (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: nC
    title: Total (Control)
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric

  - name: sm
    title: Summary measure
    type: List
    options:
      - title: Mean difference (MD)
        name: md
      - title: Standardised mean difference (SMD)
        name: smd
      - title: Ratio of means (ROM)
        name: rom
    default: md

  - name: methodSmd
    title: SMD type
    type: List
    options:
      - title: Hedges' g
        name: Hedges
      - title: Cohen's d
        name: Cohen
      - title: Glass' delta
        name: Glass
    default: Hedges

  - name: model
    title: Model
    type: List
    options:
      - title: Random & common
        name: both
      - title: Random effects
        name: random
      - title: Common effect
        name: common
    default: both

  - name: methodTau
    title: Heterogeneity estimator
    type: List
    options:
      - title: Restricted maximum-likelihood
        name: REML
      - title: Paule-Mandel
        name: PM
      - title: DerSimonian-Laird
        name: DL
      - title: Maximum-likelihood
        name: ML
      - title: Hunter-Schmidt
        name: HS
      - title: Sidik-Jonkman
        name: SJ
      - title: Hedges
        name: HE
      - title: Empirical Bayes
        name: EB
    default: REML

  - name: methodRandomCi
    title: Random effects CI method
    type: List
    options:
      - title: Classic
        name: classic
      - title: Hartung-Knapp
        name: HK
    default: classic

  - name: prediction
    title: Prediction interval
    type: Bool
    default: false

  - name: confidenceLevel
    title: Confidence level
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: showSummary
    title: Summary
    type: Bool
    default: true

  - name: forestPlot
    title: Forest plot
    type: Bool
    default: true

  - name: forestMode
    title: ""
    type: List
    options:
      - title: General
        name: general
      - title: Dimensions
        name: dimensions
    default: general

  - name: forestLayout
    title: Theme
    type: List
    options:
      - title: Default
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
    default: meta

  - name: sortBy
    title: Sort by
    type: List
    options:
      - title: Original order
        name: none
      - title: Effect size (ascending)
        name: effectAsc
      - title: Effect size (descending)
        name: effectDesc
      - title: Weight (ascending)
        name: weightAsc
      - title: Weight (descending)
        name: weightDesc
    default: none

  - name: forestTestOverall
    title: Overall effect test
    type: Bool
    default: false

  - name: forestDetails
    title: Analysis details
    type: Bool
    default: false

  - name: forestPrintI2Ci
    title: I² confidence interval
    type: Bool
    default: false

  - name: forestPrintTau2Ci
    title: Tau² confidence interval
    type: Bool
    default: false

  - name: labelE
    title: Experimental label
    type: String
    default: Experimental

  - name: labelC
    title: Control label
    type: String
    default: Control

  - name: labelLeft
    title: X-axis left label
    type: String
    default: ""

  - name: labelRight
    title: X-axis right label
    type: String
    default: ""

  - name: xlimCustom
    title: Custom x-axis limits
    type: Bool
    default: false

  - name: xlimLower
    title: Lower limit
    type: Number
    default: -20

  - name: xlimUpper
    title: Upper limit
    type: Number
    default: 20

  - name: addrowsCustom
    title: Custom space above footnotes
    type: Bool
    default: false

  - name: addrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: colgap
    title: Space between columns
    type: Number
    min: 0
    default: 2

  - name: colgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: colgapForest
    title: Space around plot
    type: Number
    min: 0
    default: 2

  - name: colgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupVariable
    title: Subgroup Variable
    type: Variable
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
      - id

  - name: tauCommon
    title: Assume common Tau² across subgroups
    type: Bool
    default: false

  - name: predictionSubgroup
    title: Subgroup prediction interval
    type: Bool
    default: false

  - name: showSubgroupSummary
    title: Summary
    type: Bool
    default: true

  - name: subgroupForestPlot
    title: Forest plot
    type: Bool
    default: true

  - name: subgroupForestMode
    title: ""
    type: List
    options:
      - title: General
        name: general
      - title: Dimensions
        name: dimensions
    default: general

  - name: printSubgroupName
    title: Subgroup Variable name
    type: Bool
    default: true

  - name: subgroupForestLayout
    title: Theme
    type: List
    options:
      - title: Default
        name: meta
      - title: Subgroup
        name: subgroup
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
    default: meta

  - name: subgroupSortBy
    title: Sort by
    type: List
    options:
      - title: Original order
        name: none
      - title: Effect size (ascending)
        name: effectAsc
      - title: Effect size (descending)
        name: effectDesc
      - title: Weight (ascending)
        name: weightAsc
      - title: Weight (descending)
        name: weightDesc
    default: none

  - name: subgroupForestTestSubgroup
    title: Subgroup differences test
    type: Bool
    default: true

  - name: subgroupForestTestEffect
    title: Subgroup effect test
    type: Bool
    default: false

  - name: subgroupForestTestOverall
    title: Overall effect test
    type: Bool
    default: false

  - name: subgroupForestPrintI2Ci
    title: I² confidence interval
    type: Bool
    default: false

  - name: subgroupForestPrintTau2Ci
    title: Tau² confidence interval
    type: Bool
    default: false

  - name: subgroupForestDetails
    title: Analysis details
    type: Bool
    default: false

  - name: subgroupLabelE
    title: Experimental label
    type: String
    default: Experimental

  - name: subgroupLabelC
    title: Control label
    type: String
    default: Control

  - name: subgroupLabelLeft
    title: X-axis left label
    type: String
    default: ""

  - name: subgroupLabelRight
    title: X-axis right label
    type: String
    default: ""

  - name: subgroupXlimCustom
    title: Custom x-axis limits
    type: Bool
    default: false

  - name: subgroupXlimLower
    title: Lower limit
    type: Number
    default: -20

  - name: subgroupXlimUpper
    title: Upper limit
    type: Number
    default: 20

  - name: subgroupAddrowsCustom
    title: Custom space above footnotes
    type: Bool
    default: false

  - name: subgroupAddrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: subgroupColgap
    title: Space between columns
    type: Number
    min: 0
    default: 2

  - name: subgroupColgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: subgroupColgapForest
    title: Space around plot
    type: Number
    min: 0
    default: 2

  - name: subgroupColgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: metaRegCovs
    title: Covariates
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric

  - name: metaRegFactors
    title: Factors
    type: Variables
    suggested:
      - nominal
    permitted:
      - factor

  - name: metaRegTerms
    title: Model terms
    type: Terms

  - name: metaRegIntercept
    title: Intercept
    type: Bool
    default: true

  - name: showMetaRegSummary
    title: Summary
    type: Bool
    default: true

  - name: bubblePlot
    title: Bubble plot
    type: Bool
    default: false

  - name: bubbleRegline
    title: Regression line
    type: Bool
    default: true

  - name: bubbleStudyLabel
    title: Study labels
    type: Bool
    default: false

  - name: leaveOneOut
    title: Leave-one-out analysis
    type: Bool
    default: false

  - name: leaveOneOutPrediction
    title: Prediction interval
    type: Bool
    default: false

  - name: showLeaveOneOutSummary
    title: Summary
    type: Bool
    default: true

  - name: leaveOneOutForestPlot
    title: Forest plot
    type: Bool
    default: true

  - name: leaveOneOutForestMode
    title: ""
    type: List
    options:
      - title: General
        name: general
      - title: Dimensions
        name: dimensions
    default: general

  - name: leaveOneOutForestLayout
    title: Theme
    type: List
    options:
      - title: Default
        name: meta
      - title: RevMan 5
        name: RevMan5
      - title: JAMA
        name: JAMA
      - title: BMJ
        name: BMJ
    default: meta

  - name: leaveOneOutSortBy
    title: Sort by
    type: List
    options:
      - title: Original order
        name: none
      - title: Effect size (ascending)
        name: effectAsc
      - title: Effect size (descending)
        name: effectDesc
      - title: I² (ascending)
        name: i2Asc
      - title: I² (descending)
        name: i2Desc
      - title: Tau² (ascending)
        name: tau2Asc
      - title: Tau² (descending)
        name: tau2Desc
    default: none

  - name: leaveOneOutForestDetails
    title: Analysis details
    type: Bool
    default: false

  - name: leaveOneOutLabelLeft
    title: X-axis left label
    type: String
    default: ""

  - name: leaveOneOutLabelRight
    title: X-axis right label
    type: String
    default: ""

  - name: leaveOneOutXlimCustom
    title: Custom x-axis limits
    type: Bool
    default: false

  - name: leaveOneOutXlimLower
    title: Lower limit
    type: Number
    default: -20

  - name: leaveOneOutXlimUpper
    title: Upper limit
    type: Number
    default: 20

  - name: leaveOneOutAddrowsCustom
    title: Custom space above footnotes
    type: Bool
    default: false

  - name: leaveOneOutAddrowsBelowOverall
    title: ""
    type: Integer
    min: 0
    default: 0

  - name: leaveOneOutColgap
    title: Space between columns
    type: Number
    min: 0
    default: 2

  - name: leaveOneOutColgapUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: leaveOneOutColgapForest
    title: Space around plot
    type: Number
    min: 0
    default: 2

  - name: leaveOneOutColgapForestUnit
    title: ""
    type: List
    options:
      - title: mm
        name: mm
      - title: cm
        name: cm
      - title: in
        name: inch
    default: mm

  - name: pubBiasMode
    title: ""
    type: List
    options:
      - title: Funnel plot
        name: funnelPlot
      - title: Trim and fill
        name: trimFill
      - title: LFK index
        name: lfkIndex
    default: funnelPlot

  - name: funnelPlot
    title: Funnel plot
    type: Bool
    default: false

  - name: funnelStudyLabel
    title: Study labels
    type: Bool
    default: false

  - name: funnelContour
    title: Contour-enhanced
    type: Bool
    default: false

  - name: funnelLegend
    title: Legend
    type: Bool
    default: true

  - name: funnelLegendPos
    title: Position
    type: List
    options:
      - title: Top right
        name: topright
      - title: Top left
        name: topleft
    default: topright

  - name: funnelLegendCex
    title: Size
    type: Number
    min: 50
    max: 200
    default: 100

  - name: asymmetryTest
    title: Test for funnel plot asymmetry
    type: Bool
    default: false

  - name: asymmetryMethod
    title: Method
    type: List
    options:
      - title: Egger
        name: Egger
      - title: Begg
        name: Begg
      - title: Thompson
        name: Thompson
      - title: Pustejovsky (SMD only)
        name: Pustejovsky
    default: Egger

  - name: showAsymmetrySummary
    title: Summary
    type: Bool
    default: true

  - name: asymmetryPlot
    title: Plot
    type: Bool
    default: false
