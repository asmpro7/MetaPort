name: metaCont
title: Continuous Meta-Analysis
jrs: "1.1"

items:
  - name: text
    type: Html
    visible: (showSummary)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
    refs:
      - metaPackage

  - name: plot
    title: Forest Plot
    type: Image
    renderFun: .forestPlot
    visible: (forestPlot)
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - forestLayout
      - sortBy
      - labelE
      - labelC
      - labelLeft
      - labelRight
      - forestWidthAdjust
      - forestWidthUnit
      - forestHeightAdjust
      - forestHeightUnit
      - xlimMode
      - xlimLower
      - xlimUpper
      - addrowsMode
      - addrowsBelowOverall
      - colgap
      - colgapUnit
      - colgapForest
      - colgapForestUnit
    refs:
      - metaPackage

  - name: subgroupText
    type: Html
    visible: false
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - subgroupVariable
      - tauCommon
      - predictionSubgroup
    refs:
      - metaPackage

  - name: subgroupPlot
    title: Subgroup Forest Plot
    type: Image
    renderFun: .subgroupForestPlot
    visible: false
    clearWith:
      - studyLabel
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - sm
      - methodSmd
      - model
      - methodTau
      - methodRandomCi
      - prediction
      - confidenceLevel
      - subgroupVariable
      - tauCommon
      - predictionSubgroup
      - printSubgroupName
      - subgroupForestLayout
      - subgroupSortBy
      - subgroupLabelE
      - subgroupLabelC
      - subgroupLabelLeft
      - subgroupLabelRight
      - subgroupForestWidthAdjust
      - subgroupForestWidthUnit
      - subgroupForestHeightAdjust
      - subgroupForestHeightUnit
      - subgroupXlimMode
      - subgroupXlimLower
      - subgroupXlimUpper
      - subgroupAddrowsMode
      - subgroupAddrowsBelowOverall
      - subgroupColgap
      - subgroupColgapUnit
      - subgroupColgapForest
      - subgroupColgapForestUnit
    refs:
      - metaPackage
