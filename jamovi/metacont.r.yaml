name: metaCont
title: Continuous Meta-Analysis
jrs: '1.1'

items:
  - name: text
    title: Overall Meta-Analysis Results
    type: Html
    clearWith:
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - studyLabel
      - groupLabelE
      - groupLabelC
      - sm
      - methodTau
      - methodSmd
      - random
      - common
      - prediction
      - confidenceLevel
    refs:
      - metaPackage

  - name: plot
    title: Forest Plot
    type: Image
    renderFun: .forestPlot
    visible: (forestPlot)
    requiresData: true
    clearWith:
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - studyLabel
      - groupLabelE
      - groupLabelC
      - sm
      - methodTau
      - methodSmd
      - random
      - common
      - prediction
      - confidenceLevel
    refs:
      - metaPackage