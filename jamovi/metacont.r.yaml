name: metaCont
title: Continuous Meta-Analysis
jrs: "1.1"

items:
  - name: text
    type: Html
    visible: (showSummary)
    refs:
      - metaPackage

  - name: plot
    title: Forest Plot
    type: Image
    renderFun: .forestPlot
    visible: (forestPlot)
    clearWith:
      - meanE
      - sdE
      - nE
      - meanC
      - sdC
      - nC
      - studyLabel
      - sm
      - methodTau
      - methodSmd
      - methodRandomCi
      - model
      - prediction
      - confidenceLevel
      - forestLayout
      - sortBy
      - labelLeft
      - labelRight
      - labelE
      - labelC
      - forestWidthAdjust
      - forestWidthUnit
      - forestHeightAdjust
      - forestHeightUnit
      - xlimMode
      - xlimLower
      - xlimUpper
      - addrowsMode
      - addrowsBelowOverall
      - colgap
      - colgapUnit
      - colgapForest
      - colgapForestUnit
    refs:
      - metaPackage
