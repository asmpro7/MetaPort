name: metaCont
title: Continuous Meta-Analysis
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: studyLabel
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nC
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Meta-Analysis
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: sm
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodSmd
            enable: (sm:smd)
      - type: LayoutBox
        children:
          - type: ComboBox
            name: model
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodTau
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodRandomCi
            enable: (!model:common)
      - type: CheckBox
        name: prediction
      - type: LayoutBox
        children:
          - type: TextBox
            name: confidenceLevel
            format: number
            width: normal
            suffix: "%"
      - type: CheckBox
        name: showSummary

      - type: Label
        label: Forest Plot
        children:
          - type: CheckBox
            name: forestPlot
          - type: ModeSelector
            name: forestMode
            children:
              - type: Content
                name: appearance
                children:
                  - type: LayoutBox
                    children:
                      - type: ComboBox
                        name: forestLayout
                        enable: (forestPlot)
                      - type: ComboBox
                        name: sortBy
                        enable: (forestPlot)
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: CheckBox
                        name: forestTestOverall
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: CheckBox
                        name: forestPrintI2Ci
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 1
                      - type: CheckBox
                        name: forestDetails
                        enable: (forestPlot)
                        cell:
                          row: 1
                          column: 0
                      - type: CheckBox
                        name: forestPrintTau2Ci
                        enable: (forestPlot)
                        cell:
                          row: 1
                          column: 1
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: labelE
                        format: string
                        enable: (forestPlot)
                        width: large
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: labelC
                        format: string
                        enable: (forestPlot)
                        width: large
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: labelLeft
                        format: string
                        enable: (forestPlot)
                        width: large
                        cell:
                          row: 1
                          column: 0
                      - type: TextBox
                        name: labelRight
                        format: string
                        enable: (forestPlot)
                        width: large
                        cell:
                          row: 1
                          column: 1
              - type: Content
                name: dimensions
                children:
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: forestWidthAdjust
                        format: number
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: forestWidthUnit
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: forestHeightAdjust
                        format: number
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: forestHeightUnit
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 3
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: xlimMode
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: xlimLower
                        format: number
                        enable: (forestPlot && xlimMode:custom)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: xlimUpper
                        format: number
                        enable: (forestPlot && xlimMode:custom)
                        cell:
                          row: 0
                          column: 2
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: addrowsMode
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: addrowsBelowOverall
                        format: number
                        suffix: rows
                        enable: (forestPlot && addrowsMode:custom)
                        cell:
                          row: 0
                          column: 1
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: colgap
                        format: number
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: colgapUnit
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: colgapForest
                        format: number
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: colgapForestUnit
                        enable: (forestPlot)
                        cell:
                          row: 0
                          column: 3

  - type: CollapseBox
    label: Subgroup Analysis
    collapsed: true
    stretchFactor: 1
    children:
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            children:
              - type: VariablesListBox
                name: subgroupVariable
                maxItemCount: 1
                isTarget: true
      - type: Label
        label: Analysis Settings
        children:
          - type: CheckBox
            name: tauCommon
            enable: ({return !!ui['subgroupVariable'].value();})
          - type: CheckBox
            name: predictionSubgroup
            enable: ({return !!ui['subgroupVariable'].value();})
          - type: CheckBox
            name: showSubgroupSummary
            enable: ({return !!ui['subgroupVariable'].value();})
      - type: Label
        label: Forest Plot
        children:
          - type: CheckBox
            name: subgroupForestPlot
            enable: ({return !!ui['subgroupVariable'].value();})
          - type: ModeSelector
            name: subgroupForestMode
            children:
              - type: Content
                name: appearance
                children:
                  - type: LayoutBox
                    children:
                      - type: CheckBox
                        name: printSubgroupName
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                      - type: ComboBox
                        name: subgroupForestLayout
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                      - type: ComboBox
                        name: subgroupSortBy
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: CheckBox
                        name: subgroupForestTestSubgroup
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 0
                      - type: CheckBox
                        name: subgroupForestPrintI2Ci
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 1
                      - type: CheckBox
                        name: subgroupForestTestEffect
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 1
                          column: 0
                      - type: CheckBox
                        name: subgroupForestPrintTau2Ci
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 1
                          column: 1
                      - type: CheckBox
                        name: subgroupForestTestOverall
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 2
                          column: 0
                      - type: CheckBox
                        name: subgroupForestDetails
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 2
                          column: 1
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: subgroupLabelE
                        format: string
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        width: large
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: subgroupLabelC
                        format: string
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        width: large
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: subgroupLabelLeft
                        format: string
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        width: large
                        cell:
                          row: 1
                          column: 0
                      - type: TextBox
                        name: subgroupLabelRight
                        format: string
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        width: large
                        cell:
                          row: 1
                          column: 1
              - type: Content
                name: dimensions
                children:
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: subgroupForestWidthAdjust
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: subgroupForestWidthUnit
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: subgroupForestHeightAdjust
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: subgroupForestHeightUnit
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 3
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: subgroupXlimMode
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: subgroupXlimLower
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value() &&
                          ui['subgroupXlimMode'].value() === 'custom';})
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: subgroupXlimUpper
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value() &&
                          ui['subgroupXlimMode'].value() === 'custom';})
                        cell:
                          row: 0
                          column: 2
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: subgroupAddrowsMode
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: subgroupAddrowsBelowOverall
                        format: number
                        suffix: rows
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value() &&
                          ui['subgroupAddrowsMode'].value() === 'custom';})
                        cell:
                          row: 0
                          column: 1
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: subgroupColgap
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: subgroupColgapUnit
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: subgroupColgapForest
                        format: number
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: subgroupColgapForestUnit
                        enable: >
                          ({return !!ui['subgroupVariable'].value() &&
                          ui['subgroupForestPlot'].value();})
                        cell:
                          row: 0
                          column: 3

  - type: CollapseBox
    label: Meta-Regression
    collapsed: true
    stretchFactor: 1
    children:
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            children:
              - type: VariablesListBox
                name: metaRegCovs
                isTarget: true
          - type: TargetLayoutBox
            children:
              - type: VariablesListBox
                name: metaRegFactors
                isTarget: true
      - type: Supplier
        name: metaRegModelSupplier
        label: Predictors
        persistentItems: true
        stretchFactor: 1
        format: term
        higherOrders: true
        children:
          - type: TargetLayoutBox
            transferAction: interactions
            children:
              - type: ListBox
                name: metaRegTerms
                valueFilter: unique
                isTarget: true
                template:
                  type: TermLabel
              - type: CheckBox
                name: metaRegIntercept
      - type: CheckBox
        name: showMetaRegSummary
      - type: CheckBox
        name: bubblePlot

  - type: CollapseBox
    label: Leave-One-Out Analysis
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Analysis Settings
        children:
          - type: CheckBox
            name: leaveOneOut
          - type: CheckBox
            name: leaveOneOutPrediction
            enable: (leaveOneOut)
          - type: CheckBox
            name: showLeaveOneOutSummary
            enable: (leaveOneOut)
      - type: Label
        label: Forest Plot
        children:
          - type: CheckBox
            name: leaveOneOutForestPlot
            enable: (leaveOneOut)
          - type: ModeSelector
            name: leaveOneOutForestMode
            children:
              - type: Content
                name: appearance
                children:
                  - type: LayoutBox
                    children:
                      - type: ComboBox
                        name: leaveOneOutForestLayout
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                      - type: ComboBox
                        name: leaveOneOutSortBy
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                  - type: LayoutBox
                    children:
                      - type: CheckBox
                        name: leaveOneOutForestDetails
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: leaveOneOutLabelLeft
                        format: string
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        width: large
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: leaveOneOutLabelRight
                        format: string
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        width: large
                        cell:
                          row: 0
                          column: 1
              - type: Content
                name: dimensions
                children:
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: leaveOneOutForestWidthAdjust
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: leaveOneOutForestWidthUnit
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: leaveOneOutForestHeightAdjust
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: leaveOneOutForestHeightUnit
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 3
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: leaveOneOutXlimMode
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: leaveOneOutXlimLower
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot && leaveOneOutXlimMode:custom)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: leaveOneOutXlimUpper
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot && leaveOneOutXlimMode:custom)
                        cell:
                          row: 0
                          column: 2
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: ComboBox
                        name: leaveOneOutAddrowsMode
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: TextBox
                        name: leaveOneOutAddrowsBelowOverall
                        format: number
                        suffix: rows
                        enable: (leaveOneOut && leaveOneOutForestPlot && leaveOneOutAddrowsMode:custom)
                        cell:
                          row: 0
                          column: 1
                  - type: LayoutBox
                    fitToGrid: true
                    children:
                      - type: TextBox
                        name: leaveOneOutColgap
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 0
                      - type: ComboBox
                        name: leaveOneOutColgapUnit
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 1
                      - type: TextBox
                        name: leaveOneOutColgapForest
                        format: number
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 2
                      - type: ComboBox
                        name: leaveOneOutColgapForestUnit
                        enable: (leaveOneOut && leaveOneOutForestPlot)
                        cell:
                          row: 0
                          column: 3
