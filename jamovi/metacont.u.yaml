name: metaCont
title: Continuous Meta-Analysis
jus: "3.0"
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: studyLabel
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nC
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Meta-Analysis
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        children:
          - type: ComboBox
            name: sm
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodSmd
            enable: (sm:smd)
      - type: LayoutBox
        children:
          - type: ComboBox
            name: model
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodTau
      - type: LayoutBox
        children:
          - type: ComboBox
            name: methodRandomCi
            enable: (!model:common)
      - type: CheckBox
        name: prediction
      - type: LayoutBox
        children:
          - type: TextBox
            name: confidenceLevel
            format: number
            width: normal
            suffix: "%"
      - type: CheckBox
        name: showSummary

  - type: CollapseBox
    label: Forest Plot
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: forestPlot
      - type: ModeSelector
        name: forestMode
        enable: (forestPlot)
        children:
          - type: Content
            name: basic
            children:
              - type: LayoutBox
                children:
                  - type: ComboBox
                    name: forestLayout
                    enable: (forestPlot)
                  - type: ComboBox
                    name: sortBy
                    enable: (forestPlot)
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: TextBox
                    name: labelE
                    format: string
                    enable: (forestPlot)
                    width: large
                    cell:
                      row: 0
                      column: 0
                  - type: TextBox
                    name: labelC
                    format: string
                    enable: (forestPlot)
                    width: large
                    cell:
                      row: 0
                      column: 1
                  - type: TextBox
                    name: labelLeft
                    format: string
                    enable: (forestPlot)
                    width: large
                    cell:
                      row: 1
                      column: 0
                  - type: TextBox
                    name: labelRight
                    format: string
                    enable: (forestPlot)
                    width: large
                    cell:
                      row: 1
                      column: 1
          - type: Content
            name: advanced
            children:
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: TextBox
                    name: forestWidthAdjust
                    format: number
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 0
                  - type: ComboBox
                    name: forestWidthUnit
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 1
                  - type: TextBox
                    name: forestHeightAdjust
                    format: number
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 2
                  - type: ComboBox
                    name: forestHeightUnit
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 3
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: ComboBox
                    name: xlimMode
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 0
                  - type: TextBox
                    name: xlimLower
                    format: number
                    enable: (forestPlot && xlimMode:custom)
                    cell:
                      row: 0
                      column: 1
                  - type: TextBox
                    name: xlimUpper
                    format: number
                    enable: (forestPlot && xlimMode:custom)
                    cell:
                      row: 0
                      column: 2
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: ComboBox
                    name: addrowsMode
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 0
                  - type: TextBox
                    name: addrowsBelowOverall
                    format: number
                    suffix: rows
                    enable: (forestPlot && addrowsMode:custom)
                    cell:
                      row: 0
                      column: 1
              - type: LayoutBox
                fitToGrid: true
                children:
                  - type: TextBox
                    name: colgap
                    format: number
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 0
                  - type: ComboBox
                    name: colgapUnit
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 1
                  - type: TextBox
                    name: colgapForest
                    format: number
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 2
                  - type: ComboBox
                    name: colgapForestUnit
                    enable: (forestPlot)
                    cell:
                      row: 0
                      column: 3
