name: metaCont
title: Continuous Meta-Analysis
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: studyLabel
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nE
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: meanC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: sdC
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        children:
          - type: VariablesListBox
            name: nC
            maxItemCount: 1
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: sm
      - type: ComboBox
        name: methodSmd
        enable: (sm:smd)
      - type: CheckBox
        name: random
      - type: CheckBox
        name: common
      - type: ComboBox
        name: methodTau
      - type: CheckBox
        name: prediction
      - type: TextBox
        name: confidenceLevel
        format: number
        width: normal
        suffix: "%"
      - type: TextBox
        name: groupLabelE
        format: string
        width: large
      - type: TextBox
        name: groupLabelC
        format: string
        width: large
  - type: CollapseBox
    label: Forest Plot
    collapsed: false
    children:
      - type: CheckBox
        name: forestPlot
